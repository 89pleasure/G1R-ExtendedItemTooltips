; Extended Item Tooltips
; Shows tooltips for equipped items in the inventory when hovered.
;
Enabled=true
Debug=false
TooltipCooldownMs=40
ForceTooltipVisibility=true
; Automatically shows the game's native comparison tooltip for compatible
; equipped armor, jewelry, and weapons while hovering a backpack item.
EnableComparisonTooltips=true
; Determines the comparison state whenever the inventory is opened. This can
; also be changed in Settings -> Game -> Mods.
ComparisonDefaultEnabled=false

; Advanced overrides. Leave empty to use built-in candidates.
; Separate entries with semicolons.
SlotHoverHooks=
SlotUnhoverHooks=
